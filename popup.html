<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>US Visa Auto Rescheduler</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Main popup wrapper -->
  <div class="wrap">
    <!-- Header / branding -->
    <div class="top">
      <div class="flag"></div>
      <div class="titleWrap">
        <div class="title">US Visa Auto Rescheduler</div>
        <div class="version">(v7.0 Integrated)</div>
      </div>
    </div>

    <!-- Settings card -->
    <div class="card">
      <!-- Login credentials used by auto-login flow -->
      <div class="field">
        <div class="label">Credentials:</div>
        <input type="email" id="loginEmail" class="input" placeholder="Email" style="margin-bottom:5px">
        <input type="password" id="loginPass" class="input" placeholder="Password">
      </div>

      <!-- Master script toggle -->
      <div class="row toggleRow">
        <label class="switch" for="toggleActive" aria-label="Activate Script toggle"><input type="checkbox" id="toggleActive"><span class="slider"></span></label>
        <div class="toggleText">Activate Script</div>
      </div>

      <!-- Auto-submit appointment after selecting date/time -->
      <div class="row toggleRow">
        <label class="switch" for="toggleAutobook" aria-label="Enable Autobook toggle"><input type="checkbox" id="toggleAutobook"><span class="slider"></span></label>
        <div class="toggleText">Enable Autobook</div>
      </div>

      <!-- On-page debug log overlay toggle -->
      <div class="row toggleRow">
        <label class="switch" for="debugOverlay" aria-label="Show Debug Overlay toggle"><input type="checkbox" id="debugOverlay"><span class="slider"></span></label>
        <div class="toggleText">Show Debug Overlay</div>
      </div>

      <!-- Date range filter -->
      <div class="twoCol">
        <div class="field">
          <div class="label">Start Date:</div>
          <input type="date" id="startDate" class="input">
        </div>
        <div class="field">
          <div class="label">End Date:</div>
          <input type="date" id="endDate" class="input">
        </div>
      </div>

      <!-- Request frequency + randomized delay settings -->
      <div class="twoCol">
        <div class="field">
          <div class="label">Frequency:</div>
          <select id="frequencyUnit" class="input">
            <option value="seconds">Seconds</option>
            <option value="minutes">Minutes</option>
          </select>
        </div>
        <div class="field">
          <div class="label">Min/Max Delay:</div>
          <div style="display:flex; gap:5px">
            <input type="number" id="minDelay" class="input" value="10">
            <input type="number" id="maxDelay" class="input" value="30">
          </div>
        </div>
      </div>

      <!-- Preferred cities used by the checker loop -->
      <div class="field">
        <div class="label">Consulate Cities:</div>
        <div class="cityBox">
          <div class="chips" id="chips"></div>
          <div class="chipsFooter">
            <div class="leftHint" id="cityHint">0 cities selected</div>
          </div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="actions">
        <button id="resetBtn" class="btn btnGreen">Reset</button>
        <button id="contactBtn" class="btn btnBlack">Contact</button>
      </div>
    </div>

    <!-- Simple status text area -->
    <div class="status" id="statusText">Ready</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
